<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
    <title>VibecodeLight</title>
    <link rel="stylesheet" href="vendor/xterm/xterm.css" />
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101218;
        color: #f5f7fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 12px 16px;
        border-bottom: 1px solid #2a2f3a;
        background: #151923;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      header .titles {
        min-width: 0;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 6px;
      }

      #repo {
        color: #a8b3cf;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
      }

      #terminal {
        flex: 1;
        padding: 8px;
        min-height: 0;
      }

      #status {
        padding: 6px 16px;
        border-top: 1px solid #2a2f3a;
        color: #a8b3cf;
        background: #151923;
        font-size: 12px;
      }

      button {
        font: inherit;
        background: #2a3a55;
        color: #f5f7fb;
        border: 1px solid #3a4d6e;
        padding: 6px 12px;
        border-radius: 4px;
        cursor: pointer;
      }

      button:hover { background: #34466a; }
      button:disabled { opacity: 0.55; cursor: not-allowed; }

      #composer-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(8, 10, 14, 0.78);
        z-index: 10;
        padding: 24px;
        box-sizing: border-box;
        overflow: auto;
      }

      #composer-overlay.open { display: block; }

      #composer-panel {
        max-width: 960px;
        margin: 0 auto;
        background: #161a24;
        border: 1px solid #2a2f3a;
        border-radius: 8px;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #composer-panel h2 {
        margin: 0;
        font-size: 16px;
      }

      #composer-task {
        width: 100%;
        min-height: 100px;
        font: inherit;
        background: #0f131c;
        color: #f5f7fb;
        border: 1px solid #2a2f3a;
        border-radius: 4px;
        padding: 8px;
        box-sizing: border-box;
        resize: vertical;
      }

      .composer-row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }

      #composer-status {
        color: #a8b3cf;
        font-size: 12px;
      }

      #composer-status.error { color: #ff8e8e; }

      .composer-section h3 {
        margin: 8px 0 4px;
        font-size: 13px;
        color: #a8b3cf;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      #composer-preview {
        background: #0f131c;
        border: 1px solid #2a2f3a;
        border-radius: 4px;
        padding: 10px;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        white-space: pre-wrap;
        max-height: 360px;
        overflow: auto;
        margin: 0;
      }

      #composer-summary {
        background: #0f131c;
        border: 1px solid #2a2f3a;
        border-radius: 4px;
        padding: 10px;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        margin: 0;
        list-style: none;
      }

      #composer-summary li {
        margin: 2px 0;
        word-break: break-all;
      }

      #composer-summary .label {
        color: #7a89ad;
        margin-right: 6px;
      }

      #artifact-actions {
        display: none;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      #artifact-actions.visible {
        display: flex;
      }

      #artifact-actions button {
        font-size: 12px;
        padding: 4px 8px;
      }

      #send-status { color: #a8b3cf; font-size: 12px; }
      #send-status.error { color: #ff8e8e; }
      #send-status.ok { color: #7ec47e; }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      #flash-pill {
        display: inline-flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 2px;
        font-size: 11px;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        padding: 4px 10px;
        border: 1px solid #2a3a55;
        border-radius: 6px;
        background: #0f131c;
        max-width: 360px;
        text-align: right;
      }

      #flash-pill .pill-main { color: #cdd6ec; }
      #flash-pill.not-configured .pill-main { color: #e7b86b; }
      #flash-pill .pill-source { color: #7a89ad; }

      #settings-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(8, 10, 14, 0.78);
        z-index: 11;
        padding: 24px;
        box-sizing: border-box;
        overflow: auto;
      }

      #settings-overlay.open { display: block; }

      #settings-panel {
        max-width: 760px;
        margin: 0 auto;
        background: #161a24;
        border: 1px solid #2a2f3a;
        border-radius: 8px;
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #settings-panel h2 { margin: 0; font-size: 16px; }

      #flash-settings-rows,
      #flash-providers {
        background: #0f131c;
        border: 1px solid #2a2f3a;
        border-radius: 4px;
        padding: 10px;
        font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        margin: 0;
        list-style: none;
      }

      #flash-settings-rows li,
      #flash-providers li { margin: 2px 0; word-break: break-all; }
      #flash-settings-rows .label,
      #flash-providers .label { color: #7a89ad; margin-right: 6px; }
      #flash-providers .provider-id { color: #cdd6ec; }
      #flash-providers ul { margin: 2px 0 8px 16px; padding: 0; list-style: disc; }

      #flash-settings-status { color: #a8b3cf; font-size: 12px; min-height: 1em; }
      #flash-settings-status.error { color: #ff8e8e; }
      #flash-settings-status.ok { color: #7ec47e; }

      .composer-flash {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .composer-flash select {
        font: inherit;
        background: #0f131c;
        color: #f5f7fb;
        border: 1px solid #2a2f3a;
        border-radius: 4px;
        padding: 4px 8px;
      }

      .composer-flash label { color: #7a89ad; font-size: 12px; }
      #composer-flash-meta { color: #7a89ad; font-size: 12px; }
    </style>
  </head>
  <body>
    <header>
      <div class="titles">
        <h1>VibecodeLight Desktop</h1>
        <div>Repository: <span id="repo">loading…</span></div>
      </div>
      <div class="header-actions">
        <div id="flash-pill" class="not-configured" title="Active flash provider/model and config source">
          <span class="pill-main">Flash: loading…</span>
          <span class="pill-source"></span>
        </div>
        <button id="open-settings" type="button">Flash Settings</button>
        <button id="open-composer" type="button">Open composer</button>
      </div>
    </header>
    <main id="terminal"></main>
    <footer id="status">Starting terminal…</footer>

    <section id="composer-overlay" aria-hidden="true">
      <div id="composer-panel" role="dialog" aria-labelledby="composer-title">
        <div class="composer-row" style="justify-content: space-between;">
          <h2 id="composer-title">Composer</h2>
          <button id="close-composer" type="button">Close</button>
        </div>
        <label for="composer-task" class="composer-section">
          <h3>Task prompt</h3>
        </label>
        <textarea id="composer-task" placeholder="Describe the task. The mock flash pipeline will render final_prompt.md and preview it here."></textarea>
        <div class="composer-section">
          <h3>Flash provider / model</h3>
          <div class="composer-flash">
            <label for="composer-flash-provider">Provider</label>
            <select id="composer-flash-provider"></select>
            <label for="composer-flash-model">Model</label>
            <select id="composer-flash-model"></select>
          </div>
          <div id="composer-flash-meta"></div>
        </div>
        <div class="composer-row">
          <button id="generate-preview" type="button">Generate preview</button>
          <button id="send-to-terminal" type="button" disabled title="Generate a preview first">Approve &amp; Send</button>
          <span id="composer-status">Idle.</span>
          <span id="send-status" aria-live="polite"></span>
        </div>
        <div class="composer-section">
          <h3>Final prompt preview</h3>
          <pre id="composer-preview" aria-live="polite">No preview yet.</pre>
        </div>
        <div class="composer-section">
          <h3>Run / artifact summary</h3>
          <ul id="composer-summary"><li><span class="label">state:</span>no run yet</li></ul>
          <div id="artifact-actions" aria-live="polite">
            <button id="copy-run-dir" type="button">Copy run dir</button>
            <button id="copy-prompt-path" type="button">Copy prompt</button>
            <button id="open-run-dir" type="button">Open run dir</button>
          </div>
        </div>
      </div>
    </section>

    <section id="settings-overlay" aria-hidden="true">
      <div id="settings-panel" role="dialog" aria-labelledby="settings-title">
        <div class="composer-row" style="justify-content: space-between;">
          <h2 id="settings-title">Flash Settings</h2>
          <button id="close-settings" type="button">Close</button>
        </div>
        <div class="composer-section">
          <h3>Active flash configuration</h3>
          <ul id="flash-settings-rows"><li>Loading…</li></ul>
        </div>
        <div class="composer-section">
          <h3>Providers &amp; models</h3>
          <ul id="flash-providers"><li>Loading…</li></ul>
        </div>
        <div class="composer-row">
          <button id="sync-from-global" type="button">Sync global → local</button>
          <button id="open-config-folder" type="button">Open config folder</button>
        </div>
        <span id="flash-settings-status" aria-live="polite"></span>
      </div>
    </section>

    <!-- Local xterm assets are copied from node_modules/@xterm/xterm by scripts/launch_desktop.js. -->
    <script src="vendor/xterm/xterm.js"></script>
    <script src="flash_settings.js"></script>
    <script>
      const terminalElement = document.getElementById('terminal');
      const repoElement = document.getElementById('repo');
      const statusElement = document.getElementById('status');
      const overlay = document.getElementById('composer-overlay');
      const openComposerButton = document.getElementById('open-composer');
      const closeComposerButton = document.getElementById('close-composer');
      const taskInput = document.getElementById('composer-task');
      const generateButton = document.getElementById('generate-preview');
      const sendButton = document.getElementById('send-to-terminal');
      const composerStatus = document.getElementById('composer-status');
      const sendStatus = document.getElementById('send-status');
      const previewElement = document.getElementById('composer-preview');
      const summaryElement = document.getElementById('composer-summary');
      const artifactActions = document.getElementById('artifact-actions');
      const copyRunDirButton = document.getElementById('copy-run-dir');
      const copyPromptPathButton = document.getElementById('copy-prompt-path');
      const openRunDirButton = document.getElementById('open-run-dir');

      // Flash settings GUI elements (header pill, settings panel, composer selection).
      const flashPill = document.getElementById('flash-pill');
      const flashPillMain = flashPill ? flashPill.querySelector('.pill-main') : null;
      const flashPillSource = flashPill ? flashPill.querySelector('.pill-source') : null;
      const openSettingsButton = document.getElementById('open-settings');
      const closeSettingsButton = document.getElementById('close-settings');
      const settingsOverlay = document.getElementById('settings-overlay');
      const flashSettingsRows = document.getElementById('flash-settings-rows');
      const flashProvidersList = document.getElementById('flash-providers');
      const flashSettingsStatus = document.getElementById('flash-settings-status');
      const syncFromGlobalButton = document.getElementById('sync-from-global');
      const openConfigFolderButton = document.getElementById('open-config-folder');
      const composerFlashProvider = document.getElementById('composer-flash-provider');
      const composerFlashModel = document.getElementById('composer-flash-model');
      const composerFlashMeta = document.getElementById('composer-flash-meta');

      const cols = 120;
      const rows = 32;

      let currentPreview = null;
      let terminalReady = false;

      function setComposerStatus(text, isError) {
        composerStatus.textContent = text;
        composerStatus.classList.toggle('error', Boolean(isError));
      }

      function setSendStatus(text, kind) {
        sendStatus.textContent = text;
        sendStatus.classList.toggle('error', kind === 'error');
        sendStatus.classList.toggle('ok', kind === 'ok');
      }

      function refreshSendButton() {
        const canSend = Boolean(currentPreview && currentPreview.ok && terminalReady);
        sendButton.disabled = !canSend;
        if (!currentPreview) {
          sendButton.title = 'Generate a preview first';
        } else if (!terminalReady) {
          sendButton.title = 'No active terminal session';
        } else {
          sendButton.title = 'Approve and submit prompt with Enter';
        }
      }

      function openComposer() {
        overlay.classList.add('open');
        overlay.setAttribute('aria-hidden', 'false');
        taskInput.focus();
      }

      function closeComposer() {
        overlay.classList.remove('open');
        overlay.setAttribute('aria-hidden', 'true');
      }

      function setArtifactActionsVisible(visible) {
        artifactActions.classList.toggle('visible', Boolean(visible));
      }

      function renderErrorSummary(error) {
        setArtifactActionsVisible(false);
        summaryElement.innerHTML = '';

        const safeError = error || {};
        const items = [
          ['error code', safeError.code ?? 'UNKNOWN'],
          ['message', safeError.message ?? 'unknown error'],
        ];
        for (const [label, value] of items) {
          const li = document.createElement('li');
          const labelSpan = document.createElement('span');
          labelSpan.className = 'label';
          labelSpan.textContent = `${label}:`;
          li.appendChild(labelSpan);
          li.appendChild(document.createTextNode(' '));
          li.appendChild(document.createTextNode(String(value)));
          summaryElement.appendChild(li);
        }

        if (Array.isArray(safeError.details) && safeError.details.length > 0) {
          const detailsItem = document.createElement('li');
          const labelSpan = document.createElement('span');
          labelSpan.className = 'label';
          labelSpan.textContent = 'details:';
          detailsItem.appendChild(labelSpan);
          const detailsList = document.createElement('ul');
          for (const detail of safeError.details) {
            const detailItem = document.createElement('li');
            detailItem.textContent = String(detail);
            detailsList.appendChild(detailItem);
          }
          detailsItem.appendChild(detailsList);
          summaryElement.appendChild(detailsItem);
        }
      }

      function renderSummary(result, send) {
        summaryElement.innerHTML = '';
        let sendCell;
        if (send && send.ok) {
          sendCell = `true / sent at ${send.sentAt ?? ''}`;
        } else if (result.terminalSend === 'not_sent') {
          sendCell = 'false / not sent';
        } else {
          sendCell = String(result.terminalSend ?? 'unknown');
        }
        const items = [
          ['run_id', result.run_id ?? '—'],
          ['runDir', result.runDir ?? '—'],
          ['final_prompt.md', result.finalPromptPath ?? '—'],
          ['context_pack.md', result.contextPackPath ?? '—'],
          ['selected_skills.json', result.selectedSkillsPath ?? '—'],
          ['terminal send', sendCell],
        ];
        if (send && send.ok) {
          items.push(['send_metadata.json', send.sendMetadataPath ?? '—']);
          if (send.currentSendMetadataPath) {
            items.push(['current/send_metadata.json', send.currentSendMetadataPath]);
          }
        }
        for (const [label, value] of items) {
          const li = document.createElement('li');
          const labelSpan = document.createElement('span');
          labelSpan.className = 'label';
          labelSpan.textContent = `${label}:`;
          li.appendChild(labelSpan);
          li.appendChild(document.createTextNode(' '));
          li.appendChild(document.createTextNode(value));
          summaryElement.appendChild(li);
        }
        setArtifactActionsVisible(Boolean(result.runDir));
      }

      async function generatePreview() {
        if (!window.vibecodeAPI || !window.vibecodeAPI.composer) {
          setComposerStatus('Composer API is unavailable.', true);
          return;
        }

        const task = (taskInput.value ?? '').trim();
        if (!task) {
          setComposerStatus('Task prompt is required.', true);
          return;
        }

        generateButton.disabled = true;
        currentPreview = null;
        setArtifactActionsVisible(false);
        setSendStatus('');
        refreshSendButton();
        setComposerStatus('Generating preview…', false);
        previewElement.textContent = 'Generating preview…';

        try {
          const result = await window.vibecodeAPI.composer.generatePreview(task);
          if (!result || result.ok !== true) {
            const error = (result && result.error) || { code: 'UNKNOWN', message: 'unknown error', details: [] };
            setComposerStatus(`Error: ${error.code} — ${error.message}`, true);
            previewElement.textContent = 'No preview (generation failed).';
            renderErrorSummary(error);
            currentPreview = null;
            return;
          }
          previewElement.textContent = result.finalPrompt ?? '';
          renderSummary(result);
          currentPreview = result;
          setComposerStatus(`Preview ready. Run: ${result.run_id}. No prompt was sent to terminal.`, false);
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          setComposerStatus(`Error: ${message}`, true);
          previewElement.textContent = 'No preview (exception).';
          renderErrorSummary({ code: 'EXCEPTION', message, details: [] });
          currentPreview = null;
        } finally {
          generateButton.disabled = false;
          refreshSendButton();
        }
      }

      async function sendToTerminal() {
        if (!window.vibecodeAPI || !window.vibecodeAPI.composer) {
          setSendStatus('Composer API is unavailable.', 'error');
          return;
        }
        if (!currentPreview || !currentPreview.ok || !currentPreview.run_id) {
          setSendStatus('Generate a preview first.', 'error');
          return;
        }
        if (!terminalReady) {
          setSendStatus('No active terminal session.', 'error');
          return;
        }

        sendButton.disabled = true;
        setSendStatus('Sending final_prompt.md with Enter…');

        try {
          const send = await window.vibecodeAPI.composer.sendPreview(currentPreview.run_id);
          if (!send || send.ok !== true) {
            const error = (send && send.error) || { code: 'UNKNOWN', message: 'unknown error', details: [] };
            setSendStatus(`Approve & Send failed: ${error.code} — ${error.message}`, 'error');
            renderErrorSummary(error);
            return;
          }
          renderSummary(currentPreview, send);
          setSendStatus(`Sent at ${send.sentAt} → ${send.sendMetadataPath}`, 'ok');
        } catch (error) {
          const message = error instanceof Error ? error.message : String(error);
          setSendStatus(`Approve & Send failed: ${message}`, 'error');
          renderErrorSummary({ code: 'EXCEPTION', message, details: [] });
        } finally {
          refreshSendButton();
        }
      }

      function copyArtifactPath(value, label) {
        if (!value || !window.vibecodeAPI || !window.vibecodeAPI.artifacts) {
          setComposerStatus(`Cannot copy ${label}: artifact API is unavailable.`, true);
          return;
        }
        window.vibecodeAPI.artifacts.copyToClipboard(value);
        setComposerStatus(`Copied ${label}.`, false);
      }

      async function openArtifactPath(value, label) {
        if (!value || !window.vibecodeAPI || !window.vibecodeAPI.artifacts) {
          setComposerStatus(`Cannot open ${label}: artifact API is unavailable.`, true);
          return;
        }
        const result = await window.vibecodeAPI.artifacts.openPath(value);
        if (!result || result.ok !== true) {
          setComposerStatus(`Open ${label} failed: ${(result && result.error) || 'unknown error'}`, true);
          return;
        }
        setComposerStatus(`Opened ${label}.`, false);
      }

      openComposerButton.addEventListener('click', openComposer);
      closeComposerButton.addEventListener('click', closeComposer);
      generateButton.addEventListener('click', () => { void generatePreview(); });
      sendButton.addEventListener('click', () => { void sendToTerminal(); });
      copyRunDirButton.addEventListener('click', () => {
        copyArtifactPath(currentPreview && currentPreview.runDir, 'run dir');
      });
      copyPromptPathButton.addEventListener('click', () => {
        copyArtifactPath(currentPreview && currentPreview.finalPromptPath, 'prompt path');
      });
      openRunDirButton.addEventListener('click', () => {
        void openArtifactPath(currentPreview && currentPreview.runDir, 'run dir');
      });
      window.addEventListener('keydown', (event) => {
        if (event.key !== 'Escape') return;
        if (settingsOverlay && settingsOverlay.classList.contains('open')) {
          closeSettings();
        } else if (overlay.classList.contains('open')) {
          closeComposer();
        }
      });

      // ---- Flash settings: thin DOM view over the preload config bridge ----
      let flashController = null;
      let composerProviderList = [];
      let composerDefaultModel = null;

      function clearChildren(el) {
        while (el && el.firstChild) el.removeChild(el.firstChild);
      }

      function renderSettingsRows(rows) {
        clearChildren(flashSettingsRows);
        for (const row of rows) {
          const li = document.createElement('li');
          const labelSpan = document.createElement('span');
          labelSpan.className = 'label';
          labelSpan.textContent = `${row.label}:`;
          li.appendChild(labelSpan);
          li.appendChild(document.createTextNode(` ${row.value}`));
          flashSettingsRows.appendChild(li);
        }
      }

      function renderProviders(list) {
        clearChildren(flashProvidersList);
        if (!list || list.length === 0) {
          const li = document.createElement('li');
          li.textContent = 'No providers configured.';
          flashProvidersList.appendChild(li);
          return;
        }
        for (const p of list) {
          const li = document.createElement('li');
          const head = document.createElement('span');
          head.className = 'provider-id';
          head.textContent = p.label ? `${p.label} (${p.id})` : p.id;
          li.appendChild(head);
          li.appendChild(
            document.createTextNode(
              `  · api_key_env: ${p.apiKeyEnv || '(none)'} · has_api_key: ${p.hasApiKey ? 'yes' : 'no'}`,
            ),
          );
          const modelsUl = document.createElement('ul');
          for (const m of p.models) {
            const mLi = document.createElement('li');
            const mName = m.label ? `${m.label} (${m.id})` : m.id;
            mLi.textContent = `${mName}${m.role ? ` [${m.role}]` : ''}`;
            modelsUl.appendChild(mLi);
          }
          li.appendChild(modelsUl);
          flashProvidersList.appendChild(li);
        }
      }

      function fillSelect(selectEl, options, selectedValue) {
        clearChildren(selectEl);
        for (const opt of options) {
          const o = document.createElement('option');
          o.value = opt.value;
          o.textContent = opt.text;
          if (opt.value === selectedValue) o.selected = true;
          selectEl.appendChild(o);
        }
      }

      function updateComposerModels(providerId) {
        if (!window.VibecodeFlashSettings) return;
        const models = window.VibecodeFlashSettings.modelsForProvider(composerProviderList, providerId);
        const opts = models.map((m) => ({ value: m.id, text: m.label ? `${m.label} (${m.id})` : m.id }));
        const selected = models.some((m) => m.id === composerDefaultModel)
          ? composerDefaultModel
          : models[0]
            ? models[0].id
            : '';
        fillSelect(composerFlashModel, opts, selected);
      }

      function renderComposerSelection(selection) {
        const providerOpts = selection.providers.map((p) => ({
          value: p.id,
          text: p.label ? `${p.label} (${p.id})` : p.id,
        }));
        fillSelect(composerFlashProvider, providerOpts, selection.defaultProvider);
        composerDefaultModel = selection.defaultModel;
        const activeProvider = selection.defaultProvider || (selection.providers[0] && selection.providers[0].id) || '';
        updateComposerModels(activeProvider);
        composerFlashMeta.textContent = `${selection.sourceText} · ${selection.note}`;
      }

      function setFlashSettingsStatus(text, kind) {
        if (!flashSettingsStatus) return;
        flashSettingsStatus.textContent = text;
        flashSettingsStatus.classList.toggle('error', kind === 'error');
        flashSettingsStatus.classList.toggle('ok', kind === 'ok');
      }

      const flashView = {
        setPill(pill) {
          if (flashPillMain) flashPillMain.textContent = pill.text;
          if (flashPillSource) flashPillSource.textContent = pill.sourceText;
          if (flashPill) flashPill.classList.toggle('not-configured', !pill.available);
        },
        setSettings(rows) {
          renderSettingsRows(rows);
        },
        setProviders(list) {
          composerProviderList = list;
          renderProviders(list);
        },
        setComposer(selection) {
          renderComposerSelection(selection);
        },
        setStatus(text, kind) {
          setFlashSettingsStatus(text, kind);
        },
      };

      function openSettings() {
        settingsOverlay.classList.add('open');
        settingsOverlay.setAttribute('aria-hidden', 'false');
        if (flashController) void flashController.refresh();
      }

      function closeSettings() {
        settingsOverlay.classList.remove('open');
        settingsOverlay.setAttribute('aria-hidden', 'true');
      }

      function setupFlashSettings() {
        if (!window.VibecodeFlashSettings || !window.vibecodeAPI || !window.vibecodeAPI.config) {
          if (flashPillMain) flashPillMain.textContent = 'Flash: unavailable';
          return;
        }
        flashController = window.VibecodeFlashSettings.createController({
          api: window.vibecodeAPI.config,
          view: flashView,
        });
        openSettingsButton.addEventListener('click', openSettings);
        closeSettingsButton.addEventListener('click', closeSettings);
        syncFromGlobalButton.addEventListener('click', () => {
          void flashController.syncFromGlobal();
        });
        openConfigFolderButton.addEventListener('click', () => {
          void flashController.openConfigFolder();
        });
        composerFlashProvider.addEventListener('change', () => {
          updateComposerModels(composerFlashProvider.value);
        });
        void flashController.refresh();
      }

      async function main() {
        if (!window.vibecodeAPI) {
          statusElement.textContent = 'Vibecode preload API is unavailable.';
          return;
        }

        const term = new Terminal({
          cols,
          rows,
          cursorBlink: true,
          convertEol: true,
          theme: { background: '#101218' },
        });
        term.open(terminalElement);
        term.focus();

        const workspace = await window.vibecodeAPI.workspace.getInfo();
        if (workspace.error) {
          repoElement.textContent = `ERROR: ${workspace.error.message}`;
          repoElement.style.color = '#ff6b6b';
          statusElement.textContent = `Repo root error: ${workspace.error.message}`;
          const banner = document.createElement('div');
          banner.style.cssText = 'background:#5c1f1f;color:#ff9999;padding:12px 16px;margin:8px;border-radius:4px;font-size:13px;';
          banner.textContent = `Repo root error: ${workspace.error.message}`;
          document.body.insertBefore(banner, document.body.firstChild);
          return;
        }
        repoElement.textContent = workspace.repoPath;

        window.vibecodeAPI.terminal.onData((data) => term.write(data));
        window.vibecodeAPI.terminal.onExit((code) => {
          statusElement.textContent = `Terminal exited with code ${code ?? 'unknown'}`;
          terminalReady = false;
          refreshSendButton();
        });
        term.onData((data) => window.vibecodeAPI.terminal.write(data));

        const session = await window.vibecodeAPI.terminal.start(workspace.repoPath, cols, rows);
        statusElement.textContent = `PTY pid ${session.pid} · ${session.shell} · ${session.cwd}`;
        terminalReady = true;
        refreshSendButton();

        window.addEventListener('resize', () => {
          window.vibecodeAPI.terminal.resize(cols, rows);
        });
      }

      main().catch((error) => {
        statusElement.textContent = error instanceof Error ? error.message : String(error);
      });

      // Initialize the flash settings GUI after all view declarations are ready
      // (independent of terminal/composer startup so the pill always loads).
      setupFlashSettings();
    </script>
  </body>
</html>
