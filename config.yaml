# VibecodeLight project configuration
#
# This is the only human-maintained project config.
# TypeScript owns this file and resolves it into per-run scanner_config.json.
# Python scanner must not read this file directly.

repo:
  name: "VibecodeLight"

context:
  include_previous_run_summary: true
  include_terminal_excerpt_for_followups: true

skills:
  project_dir: "SKILLS"
  project_skills_policy: "configurable"

commands:
  preferred_test: ""
  preferred_lint: ""
  preferred_build: ""

# Flash provider/model configuration is NOT stored here. It lives in the global
# user config (%LOCALAPPDATA%\vibecodelight\config.yaml) and the per-repo local
# workspace config (.vibecode\config.yaml) as a providers/defaults registry, with
# API keys only in %LOCALAPPDATA%\vibecodelight\.env. See README "Configuration".
